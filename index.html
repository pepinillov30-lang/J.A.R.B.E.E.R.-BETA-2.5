<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>J.A.R.B.E.E.R. OS · Beta 2.5</title>
    <meta name="theme-color" content="#020408" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/jarbeer-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/jarbeer-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Registro silencioso: si falla, la app sigue funcionando online sin caché offline.
          });
        });
      }
    </script>
  </body>
</html>
